{% extends "base.html" %}
{% block content %}

<div class="page-header">
  <div>
    <h1>Edit User</h1>
    <p>Update details for {{ user.email }}</p>
  </div>
  <a href="/users" class="btn btn-outline">&larr; Back to Users</a>
</div>

<div class="card" style="max-width: 520px;">
  <form method="post" action="/users/{{ user.id }}/edit">
    <div class="form-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" value="{{ user.name }}" required>
    </div>

    <div class="form-group">
      <label>Email (read-only)</label>
      <input type="email" value="{{ user.email }}" disabled style="background:#f5f5f5; color:#999;">
    </div>

    <div class="form-group">
      <label for="department">Department</label>
      <input type="text" id="department" name="department" value="{{ user.department }}" required>
    </div>

    <div class="form-group">
      <label for="role">Role</label>
      <select id="role" name="role">
        <option value="employee" {% if user.role=='employee' %}selected{% endif %}>Employee</option>
        <option value="manager" {% if user.role=='manager' %}selected{% endif %}>Manager</option>
        <option value="admin" {% if user.role=='admin' %}selected{% endif %}>Admin</option>
      </select>
    </div>

    <div class="form-group">
      <label for="status">Status</label>
      <select id="status" name="status">
        <option value="active" {% if user.status=='active' %}selected{% endif %}>Active</option>
        <option value="inactive" {% if user.status=='inactive' %}selected{% endif %}>Inactive</option>
      </select>
    </div>

    <div style="display:flex; gap:10px; margin-top:20px;">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="/users" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
