{% extends "base.html" %}
{% block content %}

<div class="page-header">
  <div>
    <h1>Add New User</h1>
    <p>Create a new company user account.</p>
  </div>
  <a href="/users" class="btn btn-outline">&larr; Back to Users</a>
</div>

<div class="card" style="max-width: 520px;">
  <form method="post" action="/users/add">
    <div class="form-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="e.g. Jane Doe" value="{{ form.get('name', '') }}" required>
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="e.g. jane@company.com"
        value="{{ form.get('email', '') }}" required>
    </div>

    <div class="form-group">
      <label for="department">Department</label>
      <input type="text" id="department" name="department" placeholder="e.g. Engineering"
        value="{{ form.get('department', '') }}" required>
    </div>

    <div class="form-group">
      <label for="role">Role</label>
      <select id="role" name="role">
        <option value="employee" {% if form.get('role')=='employee' %}selected{% endif %}>Employee</option>
        <option value="manager" {% if form.get('role')=='manager' %}selected{% endif %}>Manager</option>
        <option value="admin" {% if form.get('role')=='admin' %}selected{% endif %}>Admin</option>
      </select>
    </div>

    <div style="display:flex; gap:10px; margin-top:20px;">
      <button type="submit" class="btn btn-primary">Create User</button>
      <a href="/users" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
